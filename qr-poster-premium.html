<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concordia Celes Hotel - Premium QR Poster</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    @page {
      size: A4 portrait;
      margin: 0;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 210mm;
      height: 297mm;
      margin: 0;
      padding: 0;
      background: #07101f;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      font-family: 'Poppins', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .poster {
      position: relative;
      width: 210mm;
      height: 297mm;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,215,0,0.15), transparent 28%),
        radial-gradient(circle at 80% 90%, rgba(255,215,0,0.10), transparent 24%),
        linear-gradient(160deg, #09111f 0%, #101c35 45%, #08111f 100%);
      color: #fff;
    }

    .poster::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255,215,0,0.06), transparent 18%, transparent 82%, rgba(255,215,0,0.06)),
        linear-gradient(180deg, rgba(255,215,0,0.05), transparent 12%, transparent 88%, rgba(255,215,0,0.05));
      pointer-events: none;
    }

    .card {
      position: absolute;
      inset: 14mm;
      border-radius: 8mm;
      border: 0.5mm solid rgba(255,215,0,0.30);
      background: rgba(255,255,255,0.05);
      box-shadow: 0 12px 45px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      padding: 13mm 12mm;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .top-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 2.2mm 5mm;
      border-radius: 999px;
      border: 0.3mm solid rgba(255,215,0,0.35);
      background: rgba(255,215,0,0.08);
      color: #ffd700;
      font-size: 8.5pt;
      font-weight: 700;
      letter-spacing: 0.3px;
      margin-bottom: 5mm;
    }

    .logo-wrap {
      width: 34mm;
      height: 34mm;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3mm;
      border: 1.2mm solid #ffd700;
      box-shadow: 0 0 24px rgba(255,215,0,0.25);
      margin-bottom: 4.5mm;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 21pt;
      font-weight: 800;
      margin: 0;
      color: #ffd700;
      line-height: 1.08;
      letter-spacing: 0.4px;
    }

    .subtitle {
      margin-top: 3mm;
      font-size: 10.3pt;
      color: rgba(255,255,255,0.92);
      font-weight: 500;
      letter-spacing: 0.15px;
    }

    .divider {
      width: 72%;
      height: 1px;
      border: none;
      margin: 8mm auto 7mm;
      background: linear-gradient(to right, transparent, rgba(255,215,0,0.7), transparent);
    }

    .language-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3mm;
      margin-bottom: 6mm;
    }

    .lang {
      border: 0.25mm solid rgba(255,215,0,0.28);
      background: rgba(255,215,0,0.08);
      color: #ffd700;
      border-radius: 999px;
      font-size: 8.8pt;
      font-weight: 700;
      padding: 2.3mm 2mm;
      letter-spacing: 0.15px;
    }

    .qr-shell {
      position: relative;
      padding: 6mm;
      border-radius: 6mm;
      background: #fff;
      border: 1mm solid #ffd700;
      box-shadow: 0 0 30px rgba(255,215,0,0.18);
      margin-bottom: 5mm;
    }

    .qr-shell img {
      display: block;
      width: 74mm;
      height: 74mm;
    }

    .scan-title {
      font-size: 10.8pt;
      font-weight: 700;
      color: #ffd700;
      margin: 0 0 1.5mm 0;
      letter-spacing: 0.2px;
    }

    .scan-text {
      margin: 0;
      font-size: 9.8pt;
      line-height: 1.45;
      color: rgba(255,255,255,0.95);
      font-weight: 500;
    }

    .website {
      margin-top: 7mm;
      color: #ffd700;
      font-size: 10.2pt;
      font-weight: 700;
      letter-spacing: 0.35px;
    }

    .footer-note {
      margin-top: 2mm;
      color: rgba(255,255,255,0.72);
      font-size: 8.3pt;
      font-weight: 400;
    }

    .ornament {
      position: absolute;
      width: 20mm;
      height: 20mm;
      border: 0.6mm solid rgba(255,215,0,0.22);
      border-radius: 5mm;
      pointer-events: none;
    }

    .ornament.tl { top: 8mm; left: 8mm; border-right: none; border-bottom: none; }
    .ornament.tr { top: 8mm; right: 8mm; border-left: none; border-bottom: none; }
    .ornament.bl { bottom: 8mm; left: 8mm; border-right: none; border-top: none; }
    .ornament.br { bottom: 8mm; right: 8mm; border-left: none; border-top: none; }

    .btn-print {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 9999;
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      background: linear-gradient(135deg, #ffd700, #caa400);
      color: #08111f;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    .btn-print:hover {
      opacity: 0.95;
    }

    @media print {
      .btn-print {
        display: none !important;
      }
      body {
        background: #fff;
      }
      .poster {
        box-shadow: none;
      }
    }
  </style>
</head>
<body>

<button class="btn-print" onclick="window.print()">Yazdır</button>

<div class="poster">
  <div class="ornament tl"></div>
  <div class="ornament tr"></div>
  <div class="ornament bl"></div>
  <div class="ornament br"></div>

  <div class="card">
    <div class="top-badge">CONCORDIA CELES HOTEL</div>

    <div class="logo-wrap">
      <img src="logo.png" alt="Concordia Celes Hotel Logo">
    </div>

    <h1 class="title">Misafir Memnuniyet Anketi</h1>
    <div class="subtitle">Guest Satisfaction Survey</div>

    <div class="divider"></div>

    <div class="language-grid">
      <div class="lang">🇹🇷 Türkçe</div>
      <div class="lang">🇬🇧 English</div>
      <div class="lang">🇩🇪 Deutsch</div>
      <div class="lang">🇷🇺 Русский</div>
      <div class="lang">🇵🇱 Polski</div>
      <div class="lang">🇷🇴 Română</div>
    </div>

    <div class="qr-shell">
      <img id="qrImg" alt="QR Code">
    </div>

    <div>
      <p class="scan-title">QR Kodu Telefonunuzla Okutun</p>
      <p class="scan-text">Scan the QR code with your phone to open the survey.</p>
    </div>

    <div class="website">www.concordiaceles.com</div>
    <div class="footer-note">İnternet erişimi olan tüm Wi‑Fi ağlarında çalışır.</div>
  </div>
</div>

<script>
  const QR_LINK = 'https://arminkochac-cloud.github.io/ConcordiaCelesHotelOnlineAnket/index.html';
  const QR_SRC = 'https://api.qrserver.com/v1/create-qr-code/?size=420x420&data=' + encodeURIComponent(QR_LINK);

  document.getElementById('qrImg').src = QR_SRC;
</script>

</body>
</html>
