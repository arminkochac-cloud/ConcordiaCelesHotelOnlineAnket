<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏨 Concordia Celes Hotel - Misafir Anketi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <!-- DİL SEÇİMİ -->
    <div class="language-selector" id="languageSelector">
        <div class="lang-header">
            <img src="logo.png?v=1" alt="Hotel Logo" style="width:160px; margin-bottom:20px;">
            <h2 data-translate="surveyTitle">Misafir Memnuniyet Anketi</h2>
            <p>Select Language / Dil Seçin</p>
        </div>
        <div class="lang-grid">
            <button class="lang-btn" onclick="setLanguage('tr')">🇹🇷 Türkçe</button>
            <button class="lang-btn" onclick="setLanguage('en')">🇬🇧 English</button>
            <button class="lang-btn" onclick="setLanguage('de')">🇩🇪 Deutsch</button>
            <button class="lang-btn" onclick="setLanguage('ru')">🇷🇺 Русский</button>
            <button class="lang-btn" onclick="setLanguage('pl')">🇵🇱 Polski</button>
            <button class="lang-btn" onclick="setLanguage('ro')">🇷🇴 Română</button>
        </div>
    </div>

    <!-- ANA ANKET -->
    <div class="survey-form" id="surveyForm" style="display: none;">
        <div class="header">
            <img src="logo.png?v=1" alt="Logo" style="width:130px;">
            <h1 data-translate="hotelName">Concordia Celes Hotel</h1>
            <p data-translate="surveyTitle">Guest Satisfaction Survey</p>
            <div class="lang-change" onclick="changeLanguage()">
                🌐 <span id="currentLangName">TR</span>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"><span id="progressText">0%</span></div>
        </div>

        <form id="mainForm" novalidate>

            <!-- BÖLÜM 1: GENEL BİLGİLER -->
            <div class="section active" id="section1">
                <div class="section-title">
                    <span class="section-icon">👤</span>
                    <h2 data-translate="generalInfo">GENEL BİLGİLER</h2>
                </div>
                <!-- Form alanları (ad, cinsiyet, uyruk vs.) aynı kalıyor -->
                <!-- ... (orijinal form alanlarınızı buraya koyabilirsiniz) ... -->
                <div class="btn-group">
                    <button type="button" class="btn btn-next" onclick="nextSection()">İleri →</button>
                </div>
            </div>

            <!-- Örnek: BÖLÜM 2 - ÖN BÜRO -->
            <div class="section" id="section2">
                <div class="section-title">
                    <span class="section-icon">🛎️</span>
                    <h2 data-translate="frontOffice">ÖN BÜRO & RESEPSİYON</h2>
                </div>
                <div class="rating-item">
                    <label data-translate="welcomeGreeting">Giriş Karşılama</label>
                    <div class="stars" data-name="welcomeGreeting"></div>
                    <input type="hidden" name="welcomeGreeting">
                </div>
                <div class="rating-item">
                    <label data-translate="checkInProcess">Check-In İşlemleri</label>
                    <div class="stars" data-name="checkInProcess"></div>
                    <input type="hidden" name="checkInProcess">
                </div>
                <div class="rating-item">
                    <label data-translate="facilityInfo">Tesis Hakkında Bilgilendirme</label>
                    <div class="stars" data-name="facilityInfo"></div>
                    <input type="hidden" name="facilityInfo">
                </div>
                <div class="rating-item">
                    <label data-translate="frontDeskCare">Personelin İlgi ve Nezaketi</label>
                    <div class="stars" data-name="frontDeskCare"></div>
                    <input type="hidden" name="frontDeskCare">
                </div>
                <div class="rating-item">
                    <label data-translate="bellboyService">Bellboy Hizmetleri</label>
                    <div class="stars" data-name="bellboyService"></div>
                    <input type="hidden" name="bellboyService">
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-prev" onclick="prevSection()">← Geri</button>
                    <button type="button" class="btn btn-next" onclick="nextSection()">İleri →</button>
                </div>
            </div>

            <!-- Diğer bölümler (section3, section4...) aynı mantıkla devam edecek -->
            <!-- İstersen diğer tüm bölümleri de aynı şekilde data-translate ile doldurabilirim -->

            <!-- ÖNERİLER BÖLÜMÜ -->
            <div class="section" id="section11">
                <div class="section-title">
                    <span class="section-icon">📝</span>
                    <h2 data-translate="suggestions">ÖNERİLERİNİZ</h2>
                </div>
                <!-- previousStay, praisedStaff, generalComments, willReturn, wouldRecommend sorularına da data-translate eklenecek -->
                <button type="submit" class="btn btn-submit">Anketi Gönder</button>
            </div>

        </form>
    </div>

    <!-- TEŞEKKÜR SAYFASI -->
    <div class="thank-you" id="thankYou" style="display: none;">
        <div class="thank-icon">🎉</div>
        <h2 data-translate="thankYouTitle">Teşekkür Ederiz!</h2>
        <p data-translate="thankYouMessage">Değerli görüşleriniz bizim için çok önemli.</p>
        <button class="btn" onclick="resetForm()" data-translate="newSurvey">Yeni Anket</button>
    </div>
</div>

<script src="translations.js"></script>
<script src="script.js"></script>

<!-- KVKK MODAL -->
<div id="kvkkModal" class="modal">...</div>

</body>
</html>
